<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Developer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&display=swap');

        body {
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            text-align: center;
            width: 80%;
            max-width: 600px;
        }

        .terminal {
            background-color: #111;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            width: 100%;
        }

        .prompt {
            font-size: 20px;
        }

        .cursor {
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .bio, .skills {
            margin-top: 20px;
            background-color: #222;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }

        .highlight {
            color: #ffcc00;
            font-weight: bold;
        }

        .skill-container {
            margin: 10px 0;
        }

        .skill-name {
            margin-bottom: 5px;
        }

        .progress-bar {
            width: 100%;
            background-color: #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress {
            height: 10px;
            background-color: #00ffcc;
            text-align: right;
            padding-right: 5px;
            font-size: 10px;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="terminal">
            <p class="prompt">> <span id="typed-text"></span><span class="cursor">|</span></p>
        </div>
        <div class="bio">
            <h2>👨‍💻 Tentang Saya</h2>
            <p>Nama: <span class="highlight">John Doe</span></p>
            <p>Pekerjaan: <span class="highlight">Full-Stack Developer</span></p>
            <p>Email: <span class="highlight">johndoe@example.com</span></p>
        </div>
        <div class="skills">
            <h2>🚀 Skills</h2>
            <div class="skill-container">
                <p class="skill-name">HTML</p>
                <div class="progress-bar">
                    <div class="progress" style="width: 90%;">90%</div>
                </div>
            </div>
            <div class="skill-container">
                <p class="skill-name">CSS</p>
                <div class="progress-bar">
                    <div class="progress" style="width: 85%;">85%</div>
                </div>
            </div>
            <div class="skill-container">
                <p class="skill-name">JavaScript</p>
                <div class="progress-bar">
                    <div class="progress" style="width: 80%;">80%</div>
                </div>
            </div>
            <div class="skill-container">
                <p class="skill-name">React</p>
                <div class="progress-bar">
                    <div class="progress" style="width: 75%;">75%</div>
                </div>
            </div>
            <div class="skill-container">
                <p class="skill-name">Node.js</p>
                <div class="progress-bar">
                    <div class="progress" style="width: 70%;">70%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const text = "Hello, I'm John Doe.";
        let index = 0;

        function typeEffect() {
            if (index < text.length) {
                document.getElementById("typed-text").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeEffect, 100);
            }
        }

        window.onload = typeEffect;
    </script>
</body>
</html>
